{% extends "_base.html" %}

{% block title %}Создание потенциального клиента{% endblock %}

{% block content %}
<h2 class="fw-bold">Создание потенциального клиента</h2>
<div class="row bg-white px-3 py-3 mx-2 my-5 rounded pb-5 shadow-lg">
    <div class="col"></div>
    <div class="col">
        <form method="POST" action="{% url 'leads:leads-create' %}">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary">Создать</button>
            <a href="{% url 'leads:leads-list' %}" class="btn btn-secondary">Отмена</a>
        </form>
    </div>
    <div class="col"></div>
</div>
{% endblock %}
