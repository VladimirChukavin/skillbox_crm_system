{% extends "_base.html" %}

{% block title %}Удаление потенциального клиента{% endblock %}

{% block content %}
<h2 class="fw-bold">Удаление потенциального клиента</h2>
<div class="row bg-white px-3 py-3 mx-2 my-5 rounded pb-5 shadow-lg">
    <div class="col"></div>
    <div class="col">
        <p>Вы уверены, что хотите удалить "{{ object.full_name }}"?</p>
        <form method="POST" action="{% url 'leads:leads-delete' object.pk %}">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Удалить</button>
            <a href="{% url 'leads:leads-list' %}" class="btn btn-secondary">Отмена</a>
        </form>
    </div>
    <div class="col"></div>
</div>
{% endblock %}
